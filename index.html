function fitCanvas(){
  var vw = window.innerWidth, vh = window.innerHeight;
  var scale = Math.min(vw / W, vh / H);
  canvas.style.width = (W*scale) + 'px';
  canvas.style.height = (H*scale) + 'px';
}

// ---------- Audio (WebAudio, no assets) ----------
var actx = null;
function ensureAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function tone(freq, dur, type, vol, delay){
  if(!actx) return;
  var t0 = actx.currentTime + (delay||0);
  var osc = actx.createOscillator();
  var gain = actx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime((vol!==undefined?vol:0.12), t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
var SFX = {
  jump: function(){ tone(520,0.12,'square',0.10); tone(720,0.10,'square',0.06,0.03); },
  doubleJump: function(){ tone(680,0.12,'square',0.10); tone(940,0.12,'square',0.08,0.03); },

  var el = document.getElementById(id);

  function down(e){ e.preventDefault(); ensureAudio(); if(!active){ active=true; el.classList.add('active'); onDown(); } }
  function up(e){ if(e) e.preventDefault(); if(active){ active=false; el.classList.remove('active'); if(onUp) onUp(); } }
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
  el.addEventListener('pointerleave', up);
}
bindBtn('btnLeft', function(){ input.left = true; }, function(){ input.left = false; });
bindBtn('btnRight', function(){ input.right = true; }, function(){ input.right = false; });
bindBtn('btnJump', function(){ input.jumpDown = true; input.jumpPressed = true; }, function(){ input.jumpDown = false; });
bindBtn('btnDash', function(){ input.dashPressed = true; }, function(){});

  ensureAudio();
  if(e.code==='ArrowLeft'||e.code==='KeyA') input.left = true;
  if(e.code==='ArrowRight'||e.code==='KeyD') input.right = true;
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'||e.code==='KeyZ'){ if(!input.jumpDown) input.jumpPressed = true; input.jumpDown = true; e.preventDefault(); }
  if(e.code==='ShiftLeft'||e.code==='KeyX') input.dashPressed = true;
});
window.addEventListener('keyup', function(e){
  if(e.code==='ArrowLeft'||e.code==='KeyA') input.left = false;

    var m = level.moving[i];
    var off = Math.sin(gameTime*m.speed*0.02)*m.range;
    var rx = m.x + (m.axis==='x'? off:0);
    var ry = m.y + (m.axis==='y'? off:0);
    list.push({x:rx,y:ry,w:m.w,h:m.h, moving:m, off:off});
  }
  return list;
}

// ---------- Particles ----------
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var ang = Math.random()*Math.PI*2;
    var spd = 60+Math.random()*140;
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-60,life:0.5+Math.random()*0.3,color:color,size:3+Math.random()*3});
  }
}

// ---------- Collision helpers ----------
function overlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ---------- Update ----------
var gameTime = 0;
var lastTs = 0;

function damagePlayer(){
  if(invincibleTimer > 0) return;
  lives--;
  invincibleTimer = INVINCIBLE_TIME;
  screenShake = 0.3;
  SFX.hurt();
  player.vx = -player.facing*260;
  player.vy = -320;
  if(lives <= 0){
    state = STATE_GAME_OVER;
    continueUsed = false;
    SFX.gameover();
    showOverlay('GAME OVER', 'コイン合計: '+totalScore+'枚<br>もう一度挑戦しよう！', 'さいしょから', {watchAd:true, removeAds:true});
  }
}

function killPlayerPit(){
  screenShake = 0.2;
  SFX.hurt();
  lives--;
  if(lives<=0){
    state = STATE_GAME_OVER;
    continueUsed = false;
    SFX.gameover();
    showOverlay('GAME OVER', 'コイン合計: '+totalScore+'枚<br>もう一度挑戦しよう！', 'さいしょから', {watchAd:true, removeAds:true});
    return;
  }
  respawnPlayer();
}

function respawnPlayer(){
  player.x = respawnPoint.x; player.y = respawnPoint.y;
  player.vx = 0; player.vy = 0; player.jumpsUsed=0; player.dashUsed=false;
  invincibleTimer = INVINCIBLE_TIME*0.7;
}

function update(dt){
  gameTime += dt;
  if(state !== STATE_PLAY) return;

  // horizontal input
  var wantLeft = input.left, wantRight = input.right;
  if(player.dashTimer > 0){
    player.dashTimer -= dt;
    player.vx = player.dashDir * DASH_SPEED;
  } else {
    if(wantLeft && !wantRight){ player.vx -= MOVE_ACCEL*dt; player.facing = -1; }
    else if(wantRight && !wantLeft){ player.vx += MOVE_ACCEL*dt; player.facing = 1; }
    else {
      if(player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION*dt);
      else if(player.vx < 0) player.vx = Math.min(0, player.vx + FRICTION*dt);
    }
    if(player.vx > MAX_SPEED) player.vx = MAX_SPEED;
    if(player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;
  }

  // dash trigger
  if(input.dashPressed){
    input.dashPressed = false;
    if(!player.dashUsed){
      player.dashUsed = true;
      player.dashTimer = DASH_TIME;
      player.dashDir = player.facing;
      player.vy = Math.min(player.vy, 0);
      SFX.dash();
      spawnParticles(player.x+player.w/2, player.y+player.h/2, '#9be7ff', 6);
    }
  }

  // gravity + wall slide
  var oneWayList = currentOneways();
  if(!player.onGround){
    player.vy += GRAVITY*dt;
    if(player.wallDir !== 0 && player.vy > 0 && ((player.wallDir<0 && wantLeft) || (player.wallDir>0 && wantRight))){
      if(player.vy > WALL_SLIDE_MAX) player.vy = WALL_SLIDE_MAX;
    }
    if(player.vy > MAX_FALL) player.vy = MAX_FALL;
    player.coyote -= dt;
  } else {
    player.coyote = COYOTE_TIME;
  }

  // jump buffer
  if(input.jumpPressed){
    input.jumpPressed = false;
    player.jumpBuffer = JUMP_BUFFER;
  } else {
    player.jumpBuffer -= dt;
  }

  if(player.jumpBuffer > 0){
    if(player.onGround || player.coyote > 0){
      player.vy = -JUMP_VELOCITY;
      player.onGround = false;
      player.jumpsUsed = 1;
      player.coyote = 0;
      player.jumpBuffer = 0;
      SFX.jump();
      spawnParticles(player.x+player.w/2, player.y+player.h, '#ffffff', 5);
    } else if(player.wallDir !== 0){
      player.vy = -WALL_JUMP_VY;
      player.vx = -player.wallDir * WALL_JUMP_VX;
      player.facing = -player.wallDir;
      player.jumpsUsed = 1;
      player.wallDir = 0;
      player.jumpBuffer = 0;
      SFX.jump();
      spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ffffff', 6);
    } else if(player.jumpsUsed < 2){
      player.vy = -JUMP_VELOCITY*0.86;
      player.jumpsUsed = 2;
      player.jumpBuffer = 0;
      SFX.doubleJump();
      spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ffe08a', 8);
    }
  }
  if(!input.jumpDown && player.vy < -50){
    player.vy *= JUMP_CUT;
  }

  // ---- move X, collide ----
  player.x += player.vx*dt;
  player.wallDir = 0;
  for(var i=0;i<solids.length;i++){
    var s = solids[i];
    if(overlap(player, s)){
      if(player.vx > 0){ player.x = s.x - player.w; if(!player.onGround) player.wallDir = 1; }
      else if(player.vx < 0){ player.x = s.x + s.w; if(!player.onGround) player.wallDir = -1; }
      player.vx = 0;
    }
  }
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > level.width) player.x = level.width - player.w;

  // ---- move Y, collide ----
  player.prevBottom = player.y + player.h;
  player.y += player.vy*dt;
  player.onGround = false;

  for(i=0;i<solids.length;i++){
    var s2 = solids[i];
    if(overlap(player, s2)){
      if(player.vy >= 0 && player.prevBottom <= s2.y+2){
        player.y = s2.y - player.h; player.vy = 0; player.onGround = true;
        player.jumpsUsed = 0; player.dashUsed = false;
      } else if(player.vy < 0){
        player.y = s2.y + s2.h; player.vy = 0;
      } else {
        player.y = s2.y - player.h; player.vy = 0; player.onGround = true;
        player.jumpsUsed = 0; player.dashUsed = false;
      }
    }
  }
  // one-way platforms (land from above only)
  for(i=0;i<oneWayList.length;i++){
    var p = oneWayList[i];
    if(player.vy >= 0 && overlap(player,p) && player.prevBottom <= p.y+8){
      player.y = p.y - player.h; player.vy = 0; player.onGround = true;
      player.jumpsUsed = 0; player.dashUsed = false;
      if(p.moving && p.moving.axis==='x'){
        var prevOff = Math.sin((gameTime-dt)*p.moving.speed*0.02)*p.moving.range;
        player.x += (p.off - prevOff);
      }
    }
  }

  // fell in pit
  if(player.y > H + 80){
    killPlayerPit();
    return;
  }

  if(invincibleTimer > 0) invincibleTimer -= dt;

  // checkpoint
  if(level.checkpoints){
    for(var ci=0; ci<level.checkpoints.length; ci++){
      if(checkpointsHit[ci]) continue;
      var cp = level.checkpoints[ci];
      if(Math.abs(player.x - cp.x) < 40 && Math.abs(player.y - cp.y) < 60){
        checkpointsHit[ci] = true;
        respawnPoint = {x: cp.x, y: cp.y};
        SFX.checkpoint();
        spawnParticles(cp.x, cp.y, '#7CFC00', 10);
      }
    }
  }

  // spikes
  for(i=0;i<level.spikes.length;i++){
    if(overlap(player, level.spikes[i])){ killPlayerPit(); return; }
  }

  // coins
  for(i=0;i<coins.length;i++){
    var c = coins[i];
    if(c.taken) continue;
    var dx = (player.x+player.w/2) - c.x, dy = (player.y+player.h/2) - c.y;
    if(dx*dx+dy*dy < 32*32){
      c.taken = true; levelCoinsCollected++; totalScore++;
      SFX.coin();
      spawnParticles(c.x, c.y, '#ffd166', 6);
    }
  }

  // enemies
  for(i=0;i<enemies.length;i++){
    var en = enemies[i];
    if(!en.alive) continue;
    en.x += en.vx*dt;
    if(en.x < en.min){ en.x = en.min; en.vx = Math.abs(en.vx); }
    if(en.x > en.max){ en.x = en.max; en.vx = -Math.abs(en.vx); }
    en.squish = Math.max(0, en.squish - dt*4);
    var er = {x:en.x, y:en.y, w:en.w, h:en.h};
    if(overlap(player, er)){
      if(player.vy > 40 && player.prevBottom <= en.y+14){
        en.alive = false;
        player.vy = -JUMP_VELOCITY*0.62;
        player.jumpsUsed = 0;
        totalScore += 5;
        SFX.stomp();
        spawnParticles(en.x+en.w/2, en.y+en.h/2, '#c77dff', 10);
      } else {
        damagePlayer();
      }
    }
  }

  // goal
  var g = level.goal;
  if(player.x+player.w > g.x && player.x < g.x+50 && player.y+player.h > g.y-10){
    state = STATE_LEVEL_CLEAR;
    SFX.win();
    var isLast = currentLevelIndex === LEVELS.length-1;
    if(isLast){
      showOverlay('ALL CLEAR!', '全ステージクリア！<br>コイン合計: '+totalScore+'枚', 'タイトルへ', {removeAds:true});
      state = STATE_ALL_CLEAR;
    } else {
      showOverlay('LEVEL CLEAR!', 'コイン: '+levelCoinsCollected+'枚 集めた！<br>合計スコア: '+totalScore, 'つぎのステージへ');
    }
  }

  // camera
  var targetCamX = player.x - W/2 + player.w/2;
  if(targetCamX < 0) targetCamX = 0;
  if(targetCamX > level.width - W) targetCamX = level.width - W;
  camX += (targetCamX - camX) * Math.min(1, dt*8);

  // particles
  for(i=particles.length-1;i>=0;i--){
    var pt = particles[i];
    pt.x += pt.vx*dt; pt.y += pt.vy*dt; pt.vy += 600*dt; pt.life -= dt;
    if(pt.life <= 0) particles.splice(i,1);
  }
  if(screenShake > 0) screenShake -= dt;
}

// ---------- Rendering ----------
var THEMES = {
  grass: { sky1:'#7ec8ff', sky2:'#bfe9ff', hill:'#4c9a4c', hill2:'#3a7d3a', ground:'#8a5a2b', groundTop:'#4caf50' },
  sky:   { sky1:'#6fb3ff', sky2:'#d8f1ff', hill:'#5c8bd6', hill2:'#4a6fb0', ground:'#7a6a55', groundTop:'#9fd6ff' },
  cave:  { sky1:'#241b33', sky2:'#3a2a4d', hill:'#2f2440', hill2:'#221933', ground:'#4a3b52', groundTop:'#6b4f8a' }
};

function drawBackground(theme){
  var th = THEMES[theme];
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, th.sky1); grad.addColorStop(1, th.sky2);
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // clouds/stars parallax
  ctx.fillStyle = theme==='cave' ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.85)';
  for(var i=0;i<8;i++){
    var cx = ((i*260 - camX*0.25) % (W+300) + (W+300)) % (W+300) - 150;
    var cy = 60 + (i%3)*40;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 34, 16, 0, 0, Math.PI*2);
    ctx.ellipse(cx+26, cy+6, 24, 13, 0, 0, Math.PI*2);
    ctx.fill();
  }
  // hills parallax
  ctx.fillStyle = th.hill2;
  for(i=0;i<6;i++){
    var hx = ((i*340 - camX*0.45) % (W+400) + (W+400)) % (W+400) - 200;
    ctx.beginPath();
    ctx.moveTo(hx, GROUND_Y+10);
    ctx.quadraticCurveTo(hx+90, GROUND_Y-120, hx+200, GROUND_Y+10);
    ctx.fill();
  }
  ctx.fillStyle = th.hill;
  for(i=0;i<6;i++){
    var hx2 = ((i*300+120 - camX*0.65) % (W+400) + (W+400)) % (W+400) - 200;
    ctx.beginPath();
    ctx.moveTo(hx2, GROUND_Y+10);
    ctx.quadraticCurveTo(hx2+70, GROUND_Y-80, hx2+160, GROUND_Y+10);
    ctx.fill();
  }
}

function drawGround(theme){
  var th = THEMES[theme];
  for(var i=0;i<level.ground.length;i++){
    var g = level.ground[i];
    var x1 = g.x1 - camX, x2 = g.x2 - camX;
    if(x2 < 0 || x1 > W) continue;
    ctx.fillStyle = th.ground;
    ctx.fillRect(x1, GROUND_Y+8, x2-x1, H-GROUND_Y);
    ctx.fillStyle = th.groundTop;
    ctx.fillRect(x1, GROUND_Y, x2-x1, 12);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for(var xx=x1; xx<x2; xx+=26){ ctx.fillRect(xx+4, GROUND_Y+2, 14, 4); }
  }
  ctx.fillStyle = '#5a4636';
  for(i=0;i<level.walls.length;i++){
    var w = level.walls[i];
    ctx.fillRect(w.x-camX, w.y, w.w, w.h);
  }
}

function drawPlatforms(){
  var list = currentOneways();
  for(var i=0;i<list.length;i++){
    var p = list[i];
    var x = p.x - camX;
    if(x+p.w < 0 || x > W) continue;
    ctx.fillStyle = p.moving ? '#d68a3c' : '#a9744a';
    ctx.fillRect(x, p.y, p.w, p.h);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x, p.y, p.w, 4);
  }
}

function drawSpikes(){
  ctx.fillStyle = '#c9c9d4';
  for(var i=0;i<level.spikes.length;i++){
    var s = level.spikes[i];
    var x = s.x - camX;
    if(x+s.w < 0 || x > W) continue;
    var n = Math.max(2, Math.round(s.w/16));
    for(var k=0;k<n;k++){
      var bx = x + k*(s.w/n);
      ctx.beginPath();
      ctx.moveTo(bx, s.y+s.h);
      ctx.lineTo(bx+s.w/n/2, s.y);
      ctx.lineTo(bx+s.w/n, s.y+s.h);
      ctx.closePath(); ctx.fill();
    }
  }
}

function drawCoins(){
  for(var i=0;i<coins.length;i++){
    var c = coins[i];
    if(c.taken) continue;
    var x = c.x - camX;
    if(x < -20 || x > W+20) continue;
    var bob = Math.sin(gameTime*4 + c.t)*4;
    var squash = Math.abs(Math.cos(gameTime*3+c.t));
    ctx.fillStyle = '#ffd166';
    ctx.beginPath();
    ctx.ellipse(x, c.y+bob, 10*squash+3, 11, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#f4a300'; ctx.lineWidth = 2; ctx.stroke();
  }
}

function drawEnemies(){
  for(var i=0;i<enemies.length;i++){
    var en = enemies[i];
    if(!en.alive) continue;
    var x = en.x - camX;
    if(x+en.w < 0 || x > W) continue;
    var squish = 1 - en.squish*0.3;
    ctx.fillStyle = '#8a4fbf';
    ctx.beginPath();
    ctx.ellipse(x+en.w/2, en.y+en.h/2+ (1-squish)*8, en.w/2, en.h/2*squish, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    var dir = en.vx>=0?1:-1;
    ctx.beginPath(); ctx.arc(x+en.w/2+dir*5, en.y+en.h/2-2, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a1a3d';
    ctx.beginPath(); ctx.arc(x+en.w/2+dir*6, en.y+en.h/2-2, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawGoal(){
  var g = level.goal;
  var x = g.x - camX;
  if(x < -60 || x > W+60) return;
  ctx.fillStyle = '#c9a86a';
  ctx.fillRect(x+18, g.y-10, 8, H-GROUND_Y+10 - (g.y-10) + GROUND_Y - (g.y-10) - 0);
  ctx.fillRect(x+18, g.y-10, 8, (GROUND_Y+8) - (g.y-10));
  var flagWave = Math.sin(gameTime*4)*6;
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.moveTo(x+26, g.y-6);
  ctx.lineTo(x+70+flagWave, g.y+10);
  ctx.lineTo(x+26, g.y+26);
  ctx.closePath(); ctx.fill();
}

function drawPlayer(){
  var x = player.x - camX;
  var blink = invincibleTimer > 0 && Math.floor(gameTime*14)%2===0;
  if(blink) return;
  var stretch = Math.max(-0.3, Math.min(0.3, player.vy/1200));
  ctx.save();
  ctx.translate(x+player.w/2, player.y+player.h/2);
  ctx.scale(1-stretch*0.4, 1+stretch*0.4);
  ctx.fillStyle = '#ff8c42';
  ctx.beginPath();
  ctx.ellipse(0,0, player.w/2, player.h/2, 0, 0, Math.PI*2);
  ctx.fill();
  // eyes
  ctx.fillStyle = '#fff';
  var ex = player.facing*4;
  ctx.beginPath(); ctx.ellipse(ex-6, -6, 5.5, 6.5, 0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+6, -6, 5.5, 6.5, 0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1a1a';
  ctx.beginPath(); ctx.arc(ex-6+player.facing*1.5, -6, 2.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+6+player.facing*1.5, -6, 2.6, 0, Math.PI*2); ctx.fill();
  // little antenna
  ctx.strokeStyle = '#ff8c42'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0,-player.h/2); ctx.lineTo(player.facing*4, -player.h/2-10); ctx.stroke();
  ctx.fillStyle = '#ffd166';
  ctx.beginPath(); ctx.arc(player.facing*4, -player.h/2-10, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  if(player.dashTimer > 0){
    ctx.fillStyle = 'rgba(155,231,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(x+player.w/2 - player.facing*22, player.y+player.h/2, player.w/2, player.h/2*0.8, 0,0,Math.PI*2);
    ctx.fill();
  }
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life/0.6);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x-camX, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD(){
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(10,10,220,58);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('❤'.repeat(Math.max(0,lives)), 20, 34);
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('🪙 ' + totalScore, 20, 58);
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(level.name, W-16, 30);
  ctx.textAlign = 'left';
}

function render(){
  ctx.save();
  if(screenShake > 0){
    ctx.translate((Math.random()-0.5)*10*screenShake, (Math.random()-0.5)*10*screenShake);
  }
  if(state === STATE_PLAY || state===STATE_LEVEL_CLEAR){
    drawBackground(level.theme);
    drawGround(level.theme);
    drawPlatforms();
    drawSpikes();
    drawGoal();
    drawCoins();
    drawEnemies();
    drawParticles();
    drawPlayer();
    drawHUD();
  } else {
    ctx.fillStyle = '#0d1b2a';
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

ovButton2.addEventListener('pointerdown', function(e){
  e.preventDefault();
  ensureAudio();
  if(state === STATE_GAME_OVER && !continueUsed){
    continueUsed = true;
    ovButton2.classList.add('hidden');
    showRewardedAd(function(){
      lives = 1;
      respawnPlayer();
      state = STATE_PLAY;
      hideOverlay();
    });
  }
});

// 💎 広告削除・全ステージ解放（Stripe決済リンクを別タブで開く）
ovRemoveAds.addEventListener('pointerdown', function(e){
  e.preventDefault();
  window.open(REMOVE_ADS_URL, '_blank');
});

// ---------- Main loop ----------
function loop(ts){
  if(!lastTs) lastTs = ts;
  var dt = Math.min(0.033, (ts-lastTs)/1000);
  lastTs = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
